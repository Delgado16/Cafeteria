{% extends "base.html" %}

{% block title %}Crear Producto{% endblock %}

{% block section_title %}Productos{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h2 style="font-size: 1.35rem; font-weight: 800;"><i data-lucide="plus-circle" style="vertical-align: middle; margin-right: 0.5rem; width: 20px; height: 20px; color: var(--primary);"></i> Registrar Nuevo Producto</h2>
    </div>
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="nombre">Nombre del Producto</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Cappuccino Italiano" required autofocus>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción / Notas</label>
                <textarea id="descripcion" name="descripcion" placeholder="Detalles del producto, ingredientes, tamaño, etc."></textarea>
            </div>

            <div class="grid grid-2">
                <div class="form-group">
                    <label for="precio_venta">Precio de Venta (C$)</label>
                    <input type="number" id="precio_venta" name="precio_venta" step="0.01" min="0" placeholder="0.00" required>
                </div>

                <div class="form-group">
                    <label for="stock">Stock Inicial</label>
                    <input type="number" id="stock" name="stock" value="0" min="0" placeholder="0">
                </div>
            </div>

            <div class="form-group">
                <label for="imagen">Imagen Ilustrativa (Opcional)</label>
                <input type="file" id="imagen" name="imagen" accept="image/*">
            </div>

            <div class="btn-group" style="justify-content: flex-end; margin-top: 1.5rem;">
                <a href="/productos" class="btn btn-secondary">
                    <i data-lucide="x"></i> Cancelar
                </a>
                <button type="submit" class="btn btn-primary">
                    <i data-lucide="save"></i> Guardar Producto
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
