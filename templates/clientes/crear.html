{% extends "base.html" %}

{% block title %}Crear Cliente{% endblock %}

{% block section_title %}Clientes{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <div class="card-header">
        <h2 style="font-size: 1.35rem; font-weight: 800;"><i data-lucide="user-plus" style="vertical-align: middle; margin-right: 0.5rem; width: 20px; height: 20px; color: var(--primary);"></i> Registrar Nuevo Cliente</h2>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="grid grid-2">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Nombre y Apellido" required>
                </div>

                <div class="form-group">
                    <label for="cedula">Cédula / Identificación</label>
                    <input type="text" id="cedula" name="cedula" placeholder="Número de Cédula" required>
                </div>

                <div class="form-group">
                    <label for="celular">Celular / Teléfono</label>
                    <input type="text" id="celular" name="celular" placeholder="Número de Contacto">
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com">
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección de Residencia</label>
                    <input type="text" id="direccion" name="direccion" placeholder="Calle, Avenida, Edificio">
                </div>

                <div class="form-group">
                    <label for="ciudad">Ciudad</label>
                    <input type="text" id="ciudad" name="ciudad" placeholder="Ciudad de residencia">
                </div>
            </div>

            <div class="btn-group" style="margin-top: 1.5rem; justify-content: flex-end;">
                <a href="/clientes" class="btn btn-secondary">
                    <i data-lucide="x"></i> Cancelar
                </a>
                <button type="submit" class="btn btn-primary">
                    <i data-lucide="save"></i> Crear Cliente
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
