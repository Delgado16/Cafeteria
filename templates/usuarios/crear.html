{% extends "base.html" %}

{% block title %}Crear Usuario{% endblock %}

{% block section_title %}Usuarios{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h2 style="font-size: 1.35rem; font-weight: 800;"><i data-lucide="user-plus" style="vertical-align: middle; margin-right: 0.5rem; width: 20px; height: 20px; color: var(--primary);"></i> Crear Nuevo Usuario</h2>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Nombre Completo del colaborador" required autofocus>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico (Email)</label>
                <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="form-group">
                <label for="contrasena">Contraseña Temporal</label>
                <input type="password" id="contrasena" name="contrasena" placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="form-group">
                <label for="rol">Rol del Usuario</label>
                <select id="rol" name="rol" required>
                    <option value="vendedor">Vendedor (Acceso limitado de ventas)</option>
                    <option value="admin">Administrador (Acceso total al sistema)</option>
                </select>
            </div>

            <div class="btn-group" style="justify-content: flex-end; margin-top: 1.5rem;">
                <a href="/admin/usuarios" class="btn btn-secondary">
                    <i data-lucide="x"></i> Cancelar
                </a>
                <button type="submit" class="btn btn-primary">
                    <i data-lucide="save"></i> Crear Usuario
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
